{{ define "main" }}
  <main class="home">
    <section class="home-panel">
      <p class="eyebrow">{{ .Title }}</p>
      <h1>Choose a route.</h1>
      <div class="test-grid">
        {{ range .Pages }}
          <a class="test-card" href="{{ .RelPermalink }}" style="--accent: {{ .Params.accent | default "#6E298D" }}">
            <span>{{ .Title }}</span>
            <small>Open deck</small>
          </a>
        {{ end }}
      </div>
    </section>
  </main>
{{ end }}
